{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'item_list' %}">📦 INVENTORY</a>
        
        {% if user.is_authenticated %}
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="{% url 'item_list' %}">Dashboard</a>
            <a class="nav-link" href="{% url 'transaction_history' %}">Riwayat</a>
        </div>
        <div class="navbar-nav">
            <span class="nav-item nav-link text-light me-3">
                <i class="bi bi-person-circle"></i> {{ user.username }}
            </span>
            <form action="{% url 'logout' %}" method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger btn-sm">Keluar</button>
            </form>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

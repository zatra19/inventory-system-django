{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="display-1 text-primary mb-2">
                        <i class="bi bi-box-seam"></i>
                    </div>
                    <h3 class="fw-bold">Inventory System</h3>
                    <p class="text-muted">Silakan login untuk akses gudang</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Masukkan username" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>

                    {% if form.errors %}
                    <div class="alert alert-danger py-2 small">
                        Username atau password salah.
                    </div>
                    {% endif %}

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
                        Masuk Sekarang <i class="bi bi-box-arrow-in-right"></i>
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">&copy; 2026 Inventory System Pro</p>
    </div>
</div>
{% endblock %}
